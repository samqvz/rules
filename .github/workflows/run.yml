name: Build Custom Rules (Domains & IPs)
on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment and Directories
        run: |
          mkdir -p process
          mkdir -p singbox_json
          mkdir -p publish/mihomo
          mkdir -p publish/singbox
          
          echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Download Upstream Rules (Domains)
        run: |
          mkdir -p process temp
          
          extract_standard() {
              grep -E "^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-REGEX|IP-CIDR|IP-CIDR6|IP-ASN|DST-PORT|PROCESS-NAME)," "$1" || true
          }

          extract_v2ray() {
              awk '
                  /^full:/ {sub(/^full:/, "DOMAIN,"); print; next}
                  /^regexp:/ {sub(/^regexp:/, "DOMAIN-REGEX,"); print; next}
                  /^keyword:/ {sub(/^keyword:/, "DOMAIN-KEYWORD,"); print; next}
                  /^[a-zA-Z0-9]/ {print "DOMAIN-SUFFIX," $0}
              ' "$1" || true
          }
          
          echo "拉取并融合上游规则"

          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt" > temp/cn1_raw.txt
          curl -fsSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list" > temp/cn2_raw.txt
          extract_v2ray temp/cn1_raw.txt > temp/cn1.list
          extract_standard temp/cn2_raw.txt > temp/cn2.list
          cat temp/cn1.list temp/cn2.list > process/cn.list

          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/proxy-list.txt" > temp/proxy1_raw.txt
          curl -fsSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list" > temp/proxy2_raw.txt
          extract_v2ray temp/proxy1_raw.txt > temp/proxy1.list
          extract_standard temp/proxy2_raw.txt > temp/proxy2.list
          cat temp/proxy1.list temp/proxy2.list > process/proxy.list

          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt" > temp/reject1_raw.txt
          curl -fsSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml" > temp/reject2_raw.txt
          extract_v2ray temp/reject1_raw.txt > temp/reject1.list
          extract_standard temp/reject2_raw.txt > temp/reject2.list
          cat temp/reject1.list temp/reject2.list > process/reject.list

          curl -fsSL "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.list" > temp/apple1_raw.txt
          curl -fsSL "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" > temp/apple2_raw.txt
          extract_standard temp/apple1_raw.txt > temp/apple1.list
          awk -F/ '/^server=/ {print "DOMAIN-SUFFIX," $2}' temp/apple2_raw.txt > temp/apple2.list
          cat temp/apple1.list temp/apple2.list > process/apple-cn.list

          rm -rf temp
          echo "上游规则下载并融合完毕"

      - name: Download Upstream Rules (IPs)
        run: |
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" > download_cn_ip_raw.txt
          
          > download_proxy_ip_raw.txt
          for service in telegram google twitter facebook netflix; do
              curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/${service}.txt" >> download_proxy_ip_raw.txt
          done
          
          for cat in cn_ip proxy_ip; do
              awk '/:/ {print "IP-CIDR6," $0; next} {print "IP-CIDR," $0}' "download_${cat}_raw.txt" > "process/${cat}.list"
          done

      - name: Merge Custom Rules
        run: |
          mkdir -p add remove process
          
          UPSTREAM_CATS="cn proxy apple-cn reject cn_ip proxy_ip"
          CUSTOM_CATS="webrtc"
          
          for category in $CUSTOM_CATS; do
              touch "process/${category}.list"
          done
          
          ALL_CATS="$UPSTREAM_CATS $CUSTOM_CATS"
          
          for category in $ALL_CATS; do
              touch "add/${category}.list" "remove/${category}.list"
              
              cat "process/${category}.list" "add/${category}.list" > "process/${category}_temp.list"
              
              if [ -s "remove/${category}.list" ]; then
                  grep -vxF -f "remove/${category}.list" "process/${category}_temp.list" > "process/${category}_final.list"
              else
                  mv "process/${category}_temp.list" "process/${category}_final.list"
              fi
              
              rm -f "process/${category}_temp.list"
          done

      - name: Deduplicate and Sort
        run: |
          source scripts/ruleset_process.sh
          for file in process/*_final.list ; do
              if [[ "$file" == *"_ip_final.list" ]]; then
                  ruleset_sort "${file}" > tmp.list && mv tmp.list "${file}"
              else
                  format_ruleset_no_cidr "${file}" | domain_dedupe | ruleset_sort > tmp.list && mv tmp.list "${file}"
              fi
          done

      - name: Generate Sing-box JSON 
        run: |
          for file in process/*_final.list; do
              category=$(basename "$file" _final.list)
              awk -F',' '
              BEGIN {
                  d=0; s=0; k=0; r=0; c=0; sc=0; asn=0; p=0; sp=0; pn=0; pp=0; nw=0;
              }
              {
                  val = $2;
                  if($1 == "DOMAIN-REGEX" && match($0, ",")){ val = substr($0, RSTART + 1); gsub(/\\/, "\\\\", val); }
                  
                  if($1 != "DST-PORT" && $1 != "SRC-PORT" && $1 != "IP-ASN") {
                      sub(/^"/, "", val); sub(/^'"'"'/, "", val); sub(/"$/, "", val); sub(/'"'"'$/, "", val);
                      val = "\"" val "\"";
                  }
                  
                  if ($1 == "DOMAIN") { domains[++d] = val; }
                  else if ($1 == "DOMAIN-SUFFIX") { suffixes[++s] = val; }
                  else if ($1 == "DOMAIN-KEYWORD") { keywords[++k] = val; }
                  else if ($1 == "DOMAIN-REGEX") { regexes[++r] = val; }
                  else if ($1 == "IP-CIDR" || $1 == "IP-CIDR6") { cidrs[++c] = val; }
                  else if ($1 == "SRC-IP-CIDR") { scidrs[++sc] = val; }
                  else if ($1 == "IP-ASN") { asns[++asn] = val; }
                  else if ($1 == "DST-PORT") { ports[++p] = val; }
                  else if ($1 == "SRC-PORT") { sports[++sp] = val; }
                  else if ($1 == "PROCESS-NAME") { pnames[++pn] = val; }
                  else if ($1 == "PROCESS-PATH") { ppaths[++pp] = val; }
                  else if ($1 == "NETWORK") { nets[++nw] = val; }
              }
              END {
                  printf "{\n  \"version\": 4,\n  \"rules\": [\n";
                  first = 1;
                  
                  if (d>0) { printf "%s    {\n      \"domain\": [\n", (first?"":",\n"); for(i=1;i<=d;i++) printf "        %s%s\n", domains[i], (i<d?",":""); printf "      ]\n    }"; first=0; }
                  if (s>0) { printf "%s    {\n      \"domain_suffix\": [\n", (first?"":",\n"); for(i=1;i<=s;i++) printf "        %s%s\n", suffixes[i], (i<s?",":""); printf "      ]\n    }"; first=0; }
                  if (k>0) { printf "%s    {\n      \"domain_keyword\": [\n", (first?"":",\n"); for(i=1;i<=k;i++) printf "        %s%s\n", keywords[i], (i<k?",":""); printf "      ]\n    }"; first=0; }
                  if (r>0) { printf "%s    {\n      \"domain_regex\": [\n", (first?"":",\n"); for(i=1;i<=r;i++) printf "        %s%s\n", regexes[i], (i<r?",":""); printf "      ]\n    }"; first=0; }
                  if (c>0) { printf "%s    {\n      \"ip_cidr\": [\n", (first?"":",\n"); for(i=1;i<=c;i++) printf "        %s%s\n", cidrs[i], (i<c?",":""); printf "      ]\n    }"; first=0; }
                  if (sc>0) { printf "%s    {\n      \"source_ip_cidr\": [\n", (first?"":",\n"); for(i=1;i<=sc;i++) printf "        %s%s\n", scidrs[i], (i<sc?",":""); printf "      ]\n    }"; first=0; }
                  if (asn>0) { printf "%s    {\n      \"ip_asn\": [\n", (first?"":",\n"); for(i=1;i<=asn;i++) printf "        %s%s\n", asns[i], (i<asn?",":""); printf "      ]\n    }"; first=0; }
                  if (p>0) { printf "%s    {\n      \"port\": [\n", (first?"":",\n"); for(i=1;i<=p;i++) printf "        %s%s\n", ports[i], (i<p?",":""); printf "      ]\n    }"; first=0; }
                  if (sp>0) { printf "%s    {\n      \"source_port\": [\n", (first?"":",\n"); for(i=1;i<=sp;i++) printf "        %s%s\n", sports[i], (i<sp?",":""); printf "      ]\n    }"; first=0; }
                  if (pn>0) { printf "%s    {\n      \"process_name\": [\n", (first?"":",\n"); for(i=1;i<=pn;i++) printf "        %s%s\n", pnames[i], (i<pn?",":""); printf "      ]\n    }"; first=0; }
                  if (pp>0) { printf "%s    {\n      \"process_path\": [\n", (first?"":",\n"); for(i=1;i<=pp;i++) printf "        %s%s\n", ppaths[i], (i<pp?",":""); printf "      ]\n    }"; first=0; }
                  if (nw>0) { printf "%s    {\n      \"network\": [\n", (first?"":",\n"); for(i=1;i<=nw;i++) printf "        %s%s\n", nets[i], (i<nw?",":""); printf "      ]\n    }"; first=0; }
                  
                  printf "\n  ]\n}\n";
              }' "$file" > "singbox_json/${category}.json"
          done

      - name: Output JSON and YAML
        run: |
          cp singbox_json/*.json publish/singbox/
          
          for file in process/*_final.list; do
              category=$(basename "$file" _final.list)
              echo "payload:" > "publish/mihomo/${category}.yaml"
              sed "s/^/  - '/; s/$/'/" "$file" >> "publish/mihomo/${category}.yaml"
          done

      - name: Compile SRS and MRS
        run: |
          SINGBOX_LATEST=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Download Sing-box: $SINGBOX_LATEST"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_LATEST}/sing-box-${SINGBOX_LATEST}-linux-amd64.tar.gz" -O - | tar -zxf -
          mv sing-box-*/sing-box ./sing-box && chmod +x ./sing-box
          
          mihomo_version=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-v3-${mihomo_version}.gz" -O - | gzip -d > ./mihomo
          chmod +x ./mihomo

          for category in cn proxy apple-cn reject cn_ip proxy_ip webrtc; do
              # 编译 Sing-box SRS
              ./sing-box rule-set compile --output "publish/singbox/${category}.srs" "singbox_json/${category}.json"
              
              # 编译 Mihomo MRS
              if [[ "$category" == *"_ip" ]]; then
                  awk '/^IP-CIDR6?,/ { sub(/^IP-CIDR6?,/, ""); sub(/,no-resolve$/, ""); print }' "process/${category}_final.list" > "process/${category}_mihomo.list"
                  ./mihomo convert-ruleset ipcidr text "process/${category}_mihomo.list" "publish/mihomo/${category}.mrs"
              else
                  awk '/^DOMAIN,|^DOMAIN-SUFFIX,/ { sub(/^DOMAIN-SUFFIX,/, "+."); sub(/^DOMAIN,/, ""); print }' "process/${category}_final.list" > "process/${category}_mihomo.list"
                  ./mihomo convert-ruleset domain text "process/${category}_mihomo.list" "publish/mihomo/${category}.mrs"
              fi
          done

      - name: Git Push Assets to "release" Branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Auto Build & Release on ${{ env.BUILDTIME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
