name: Build Custom Rules (Domains & IPs)
on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *" # 每天定时运行 (UTC+8 早上 6:30)
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment and Directories
        run: |
          mkdir -p process
          mkdir -p singbox_json
          mkdir -p publish/mrs
          mkdir -p publish/srs
          
          echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Download Upstream Rules (Domains)
        run: |
          # 下载域名规则
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/proxy-list.txt" > download_proxy.txt
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt" > download_cn.txt
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt" > download_reject.txt
          curl -fsSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-domains.txt" >> download_reject.txt
          curl -fsSL "https://raw.githubusercontent.com/felixonmars/dnsmasq-china-list/master/apple.china.conf" > download_apple_raw.txt
          
          # 格式化通用域名规则 (proxy, cn, reject)
          for cat in proxy cn reject; do
              awk '
                  /^full:/   { sub(/^full:/, "DOMAIN,"); print; next }
                  /^regexp:/ { sub(/^regexp:/, "DOMAIN-REGEX,"); print; next }
                  /^\w/ { print "DOMAIN-SUFFIX," $0 }
              ' "download_${cat}.txt" > "process/${cat}.list"
          done
          
          # 特殊格式化 Apple-CN
          awk -F/ '/^server=\// {print "DOMAIN-SUFFIX," $2}' download_apple_raw.txt > process/apple-cn.list

      - name: Download Upstream Rules (IPs)
        run: |
          # 1. 下载国内 IP (cn_ip)
          curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt" > download_cn_ip_raw.txt
          
          # 2. 下载并合并主流代理服务 IP (proxy_ip)
          > download_proxy_ip_raw.txt
          for service in telegram google twitter facebook netflix; do
              curl -fsSL "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/${service}.txt" >> download_proxy_ip_raw.txt
          done
          
          # 格式化 IP 规则 (判断是否包含冒号来区分 IPv4 和 IPv6)
          for cat in cn_ip proxy_ip; do
              awk '/:/ {print "IP-CIDR6," $0; next} {print "IP-CIDR," $0}' "download_${cat}_raw.txt" > "process/${cat}.list"
          done

      - name: Merge Custom Rules (合并自定义增减)
        run: |
          mkdir -p custom/add custom/remove
          
          # 遍历所有 6 个分类
          for category in cn proxy apple-cn reject cn_ip proxy_ip; do
              # 如果本地没有建文件，自动 touch 避免报错
              touch "custom/add/${category}.list" "custom/remove/${category}.list"
              
              # 合并上游与 Add，利用 grep 剔除 Remove
              cat "process/${category}.list" "custom/add/${category}.list" | \
              grep -vxF -f "custom/remove/${category}.list" > "process/${category}_final.list"
          done

      - name: Deduplicate and Sort (调用去重脚本)
        run: |
          source scripts/ruleset_process.sh
          for file in process/*_final.list ; do
              # 只有域名规则需要过 domain_dedupe，IP 规则直接 sort 即可
              if [[ "$file" == *"_ip_final.list" ]]; then
                  ruleset_sort "${file}" > tmp.list && mv tmp.list "${file}"
              else
                  format_ruleset_no_cidr "${file}" | domain_dedupe | ruleset_sort > tmp.list && mv tmp.list "${file}"
              fi
          done

      - name: Generate Sing-box JSON 
        run: |
          for file in process/*_final.list; do
              category=$(basename "$file" _final.list)
              awk -F',' '
              BEGIN { printf "{\n  \"version\": 2,\n  \"rules\": [\n    {\n"; }
              {
                  if($1 == "DOMAIN-REGEX" && match($0, ",")){ $2 = substr($0, RSTART + 1); gsub(/\\/, "\\\\", $2); }
                  sub(/^"/, "", $2); sub(/^'"'"'/, "", $2); sub(/"$/, "", $2); sub(/'"'"'$/, "", $2);
                  $2 = "\"" $2 "\"";
                  if ($1 == "DOMAIN") {
                      if (!domain++) { if (NR > 1) printf "\n      ],\n"; printf "      \"domain\": [\n        %s", $2; }
                      else { printf ",\n        %s", $2; }
                  } else if ($1 == "DOMAIN-SUFFIX") {
                      if (!suffix++) { if (NR > 1) printf "\n      ],\n"; printf "      \"domain_suffix\": [\n        %s", $2; }
                      else { printf ",\n        %s", $2; }
                  } else if ($1 == "DOMAIN-KEYWORD") {
                      if (!keyword++) { if (NR > 1) printf "\n      ],\n"; printf "      \"domain_keyword\": [\n        %s", $2; }
                      else { printf ",\n        %s", $2; }
                  } else if ($1 == "DOMAIN-REGEX") {
                      if (!regex++) { if (NR > 1) printf "\n      ],\n"; printf "      \"domain_regex\": [\n        %s", $2; }
                      else { printf ",\n        %s", $2; }
                  } else if ($1 == "IP-CIDR" || $1 == "IP-CIDR6") {
                      # 恢复对 IP 段的 JSON 解析逻辑
                      if (!cidr++) { if (NR > 1) printf "\n      ],\n"; printf "      \"ip_cidr\": [\n        %s", $2; }
                      else { printf ",\n        %s", $2; }
                  }
              }
              END { printf "\n      ]\n    }\n  ]\n}\n"; }' "$file" > "singbox_json/${category}.json"
          done

      - name: Compile SRS (Sing-box) and MRS (Mihomo)
        run: |
          sing_version=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${sing_version}/sing-box-${sing_version}-linux-amd64.tar.gz" -O sing-box.tar.gz
          tar -zxf sing-box.tar.gz
          mv sing-box-*/sing-box ./sing-box && chmod +x ./sing-box
          
          mihomo_version=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-v3-${mihomo_version}.gz" -O - | gzip -d > ./mihomo
          chmod +x ./mihomo

          for category in cn proxy apple-cn reject cn_ip proxy_ip; do
              # 编译 Sing-box SRS
              ./sing-box rule-set compile --output "publish/srs/${category}.srs" "singbox_json/${category}.json"
              
              # 编译 Mihomo MRS：注意区分 domain 和 ipcidr 指令
              if [[ "$category" == *"_ip" ]]; then
                  ./mihomo convert-ruleset ipcidr text "process/${category}_final.list" "publish/mrs/${category}.mrs"
              else
                  ./mihomo convert-ruleset domain text "process/${category}_final.list" "publish/mrs/${category}.mrs"
              fi
          done

      - name: Git Push Assets to "release" Branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Auto Build & Release on ${{ env.BUILDTIME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
